
<!doctype html>
<html lang="en" data-theme="light" data-palette="tech">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomo — Focus Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklcH(98% 0.005 250);
  --surface: oklcH(100% 0 0);
  --fg: oklcH(22% 0.02 240);
  --muted: oklcH(50% 0.018 240);
  --border: oklcH(90% 0.008 240);
  --accent: oklcH(58% 0.16 145);
  --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, courier;
  --radius: 8px;
  --accent-soft: oklcH(from var(--accent) l c h / 0.1);
  --break-color: oklcH(56% 0.14 255);
  --break-soft: oklcH(from var(--break-color) l c h / 0.1);
  --sidebar: 280px;
  --sky-top: oklcH(68% 0.08 235);
  --sky-bottom: oklcH(92% 0.03 220);
  --cloud-blob: oklcH(100% 0 0 / 0.45);
}

[data-theme="dark"] {
  --bg: oklcH(16% 0.008 250);
  --surface: oklcH(20% 0.01 240);
  --fg: oklcH(92% 0.005 250);
  --muted: oklcH(60% 0.008 240);
  --border: oklcH(30% 0.008 240);
  --accent: oklcH(64% 0.18 145);
  --accent-soft: oklcH(from var(--accent) l c h / 0.15);
  --break-color: oklcH(62% 0.14 255);
  --break-soft: oklcH(from var(--break-color) l c h / 0.15);
  --sky-top: oklcH(24% 0.04 260);
  --sky-bottom: oklcH(14% 0.03 270);
  --cloud-blob: oklcH(55% 0.04 260 / 0.25);
}

/* Palette Variations */
[data-palette="sunset"] { --accent: oklcH(62% 0.18 35); --break-color: oklcH(58% 0.16 10); --sky-top: oklcH(62% 0.12 45); --sky-bottom: oklcH(88% 0.06 55); }
[data-theme="dark"][data-palette="sunset"] { --accent: oklcH(68% 0.18 35); --break-color: oklcH(64% 0.16 10); --sky-top: oklcH(28% 0.08 40); --sky-bottom: oklcH(16% 0.06 50); }

[data-palette="ocean"] { --accent: oklcH(55% 0.14 210); --break-color: oklcH(50% 0.12 240); --sky-top: oklcH(45% 0.1 230); --sky-bottom: oklcH(80% 0.06 200); }
[data-theme="dark"][data-palette="ocean"] { --accent: oklcH(62% 0.16 210); --break-color: oklcH(56% 0.14 240); --sky-top: oklcH(20% 0.06 240); --sky-bottom: oklcH(1%2 0.04 230); }

[data-palette="forest"] { --accent: oklcH(50% 0.16 150); --break-color: oklcH(55% 0.12 170); --sky-top: oklcH(40% 0.08 160); --sky-bottom: oklcH(75% 0.06 140); }
[data-theme="dark"][data-palette="forest"] { --accent: oklcH(58% 0.18 150); --break-color: oklcH(62% 0.14 170); --sky-top: oklcH(18% 0.06 150); --sky-bottom: oklcH(10% 0.04 160); }

[data-palette="lavender"] { --accent: oklcH(56% 0.16 290); --break-color: oklcH(52% 0.14 310); --sky-top: oklcH(55% 0.1 270); --sky-bottom: oklcH(85% 0.05 290); }
[data-theme="dark"][data-palette="lavender"] { --accent: oklcH(64% 0.18 290); --break-color: oklcH(60% 0.16 310); --sky-top: oklcH(22% 0.08 280); --sky-bottom: oklcH(14% 0.05 290); }

[data-palette="midnight"] { --accent: oklcH(60% 0.12 280); --break-color: oklcH(55% 0.1 300); --sky-top: oklcH(25% 0.08 265); --sky-bottom: oklcH(60% 0.04 250); }
[data-theme="dark"][data-palette="midnight"] { --accent: oklcH(66% 0.14 280); --break-color: oklcH(60% 0.12 300); --sky-top: oklcH(12% 0.06 270); --sky-bottom: oklcH(8% 0.03 260); }

[data-palette="cherry"] { --accent: oklcH(62% 0.16 10); --break-color: oklcH(58% 0.14 350); --sky-top: oklcH(65% 0.1 20); --sky-bottom: oklcH(90% 0.04 30); }
[data-theme="dark"][data-palette="cherry"] { --accent: oklcH(68% 0.18 10); --break-color: oklcH(64% 0.16 350); --sky-top: oklcH(26% 0.08 15); --sky-bottom: oklcH(15% 0.05 20); }

[data-palette="desert"] { --accent: oklcH(55% 0.16 50); --break-color: oklcH(52% 0.14 40); --sky-top: oklcH(60% 0.1 60); --sky-bottom: oklcH(88% 0.05 70); }
[data-theme="dark"][data-palette="desert"] { --accent: oklcH(62% 0.18 50); --break-color: oklcH(58% 0.16 40); --sky-top: oklcH(28% 0.08 55); --sky-bottom: oklcH(16% 0.05 60); }

[data-palette="neon"] { --accent: oklcH(65% 0.2 160); --break-color: oklcH(70% 0.18 300); --sky-top: oklcH(15% 0.1 260); --sky-bottom: oklcH(30% 0.08 280); }
[data-theme="dark"][data-palette="neon"] { --accent: oklcH(72% 0.22 160); --break-color: oklcH(76% 0.2 300); --sky-top: oklcH(8% 0.06 270); --sky-bottom: oklcH(5% 0.04 260); }

[data-palette="mono"] { --accent: oklcH(45% 0 0); --break-color: oklcH(55% 0 0); --sky-top: oklcH(50% 0 0); --sky-bottom: oklcH(80% 0 0); }
[data-theme="dark"][data-palette="mono"] { --accent: oklcH(55% 0 0); --break-color: oklcH(62% 0 0); --sky-top: oklcH(22% 0 0); --sky-bottom: oklcH(12% 0 0); }

[data-palette="aurora"] { --accent: oklcH(62% 0.18 140); --break-color: oklcH(60% 0.16 320); --sky-top: oklcH(30% 0.1 220); --sky-bottom: oklcH(60% 0.08 180); }
[data-theme="dark"][data-palette="aurora"] { --accent: oklcH(68% 0.2 140); --break-color: oklcH(66% 0.18 320); --sky-top: oklcH(1%2 0.08 240); --sky-bottom: oklcH(8% 0.05 200); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font-body);
  font-weight: 700;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background .3s, color .3s;
}

.sky {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
  overflow: hidden;
  transition: background .6s;
}
.sky::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 200% 60% at 30% 100%, oklcH(100% 0 0 / 0.04), transparent 60%),
    radial-gradient(ellipse 150% 50% at 70% 100%, oklcH(100% 0 0 / 0.03), transparent 50%);
  pointer-events: none;
}

.cloud {
  position: absolute;
  animation: drift linear infinite;
  will-change: transform;
}
.cloud span {
  position: absolute;
  border-radius: 50%;
  background: var(--cloud-blob);
}

.cloud-1 { width: 340px; height: 120px; top: 10%; animation-duration: 60s; left: -340px; filter: blur(18px); }
.cloud-2 { width: 280px; height: 100px; top: 24%; animation-duration: 75s; left: -280px; animation-delay: -18s; filter: blur(15px); }
.cloud-3 { width: 400px; height: 140px; top: 15%; animation-duration: 70s; left: -400px; animation-delay: -38s; filter: blur(20px); }
.cloud-4 { width: 220px; height: 80px; top: 34%; animation-duration: 85s; left: -220px; animation-delay: -55s; filter: blur(12px); }
.cloud-5 { width: 300px; height: 110px; top: 5%; animation-duration: 65s; left: -300px; animation-delay: -72s; filter: blur(16px); }

@keyframes drift {
  from { transform: translateX(0); }
  to { transform: translateX(calc(100vw + 400px)); }
}

[data-theme="dark"] .cloud { opacity: 0.6; }

header {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid oklcH(from var(--border) l c h / 0.5);
  background: oklcH(from var(--surface) l c h / 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.logo {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  display: flex;
  align-items: center;
}
.logo img { height: 28px; width: auto; object-fit: contain; filter: drop-shadow(0 0 2px #000) drop-shadow(0 0 2px #000); }

.header-actions { display: flex; gap: 8px; }
.icon-btn {
  background: oklcH(from var(--surface) l c h / 0.3);
  border: 0.5px solid oklcH(from var(--border) l c h / 0.4);
  border-radius: 9999px;
  color: var(--muted);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  box-shadow: 0 2px 8px oklcH(0% 0 0 / 0.04), inset 0 1px 0 oklcH(100% 0 0 / 0.12);
  transition: all .25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.icon-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 9999px;
  background: linear-gradient(135deg, oklcH(100% 0 0 / 0.15) 0%, transparent 60%);
  pointer-events: none;
}
.icon-btn:hover { color: var(--fg); background: oklcH(from var(--surface) l c h / 0.5); border-color: oklcH(from var(--fg) l c h / 0.3); box-shadow: 0 4px 14px oklcH(0% 0 0 / 0.08); }

.app { position: relative; z-index: 1; display: flex; flex: 1; }
.sidebar {
  width: var(--sidebar);
  flex-shrink: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  background: transparent;
}
.main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.card {
  background: oklcH(from var(--surface) l c h / 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid oklcH(from var(--border) l c h / 0.5);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 32px oklcH(0% 0 0 / 0.08);
  transition: background .3s, border-color .3s, box-shadow .3s;
}
.card-title {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 12px;
}

.stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; }
.stat-label { font-size: 13px; color: var(--muted); }
.stat-value { font-family: var(--font-display); font-size: 15px; font-variant-numeric: tabular-nums; font-weight: 700; }
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 999px;
  transition: width .4s;
}

.task-input-wrap { display: flex; gap: 6px; margin-bottom: 12px; }
.task-input-wrap input {
  flex: 1;
  min-width: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 13px;
  background: var(--bg);
  color: var(--fg);
  outline: none;
}
.task-input-wrap input:focus { border-color: var(--accent); }
.task-input-wrap button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  width: 32px;
  height: 32px;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
  font-weight: 800;
}
.task-list { list-style: none; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; min-height: 0; }
.task-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: var(--radius);
  font-size: 13px;
  transition: background .15s;
}
.task-item:hover { background: var(--bg); }
.task-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.task-check.done { background: var(--accent); border-color: var(--accent); }
.task-check.done::after { content: '✋"; font-size: 10px; color: #fff; font-weight: 800; }
.task-text { flex: 1; transition: color .2s; }
.task-text.done { color: var(--muted); text-decoration: line-through; }
.task-del {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 14px;
  opacity: 0;
}
.task-item:hover .task-del { opacity: 1; }

.timer-area {
  text-align: center;
  background: oklcH(from var(--surface) l c h / 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid oklcH(from var(--border) l c h / 0.5);
  border-radius: 20px;
  padding: 48px 64px;
  box-shadow: 0 8px 32px oklcH(0% 0 0 / 0.08);
}
.timer-state {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 8px;
}
.timer-state.break-state { color: var(--break-color); }
.timer-display {
  font-family: var(--font-display);
  font-size: clamp(64px, 10vw, 128px);
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: -0.04.em;
  color: var(--fg);
  margin-bottom: 4px;
}
.timer-session { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

/* Apple Style Glass Buttons — premium frosted glass */
.timer-controls { display: flex; gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
.timer-btn {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  border: none;
  border-radius: 9999px;
  padding: 12px 28px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: all .25s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform .12s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
}
.timer-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 9999px;
  background: linear-gradient(135deg, oklcH(100% 0 0 / 0.18) 0%, oklcH(100% 0 0 / 0) 50%, oklcH(0% 0 0 / 0.04) 100%);
  pointer-events: none;
}
.timer-btn::after {
  content: '';
  position: absolute;
  inset: -1px;
  border-radius: 9999px;
  background: linear-gradient(135deg, oklcH(100% 0 0 / 0.25) 0%, transparent 40%, transparent 60%, oklcH(0% 0 0 / 0.08) 100%);
  mask: linear(#fff 0 0) content-box, linear(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask-composite: xor;
  padding: 1px;
  pointer-events: none;
}
.timer-btn:active { transform: scale(0.96); }

.btn-primary {
  background: oklcH(from var(--accent) l c h / 0.55);
  color: #fff;
  border: 0.5px solid oklcH(from var(--accent) l c h / 0.35);
  box-shadow: 0 4px 16px oklcH(from var(--accent) l c h / 0.25), inset 0 1px 0 oklcH(100% 0 0 / 0.15);
}
.btn-primary:hover { 
  background: oklcH(from var(--accent) l c h / 0.7); 
  box-shadow: 0 8px 28px oklcH(from var(--accent) l c h / 0.35), inset 0 1px 0 oklcH(100% 0 0 / 0.2);
  transform: translateY(-1px);
}

.btn-secondary {
  background: oklcH(from var(--accent) l c h / 0.07);
  color: var(--accent);
  border: 0.5px solid oklcH(from var(--accent) l c h / 0.25);
  box-shadow: 0 2px 8px oklcH(0% 0 0 / 0.04), inset 0 1px 0 oklcH(100% 0 0 / 0.1);
}
.btn-secondary:hover { 
  background: oklcH(from var(--accent) l c h / 0.14); 
  border-color: oklcH(from var(--accent) l c h / 0.4);
  box-shadow: 0 6px 20px oklcH(from var(--accent) l c h / 0.12), inset 0 1px 0 oklcH(100% 0 0 / 0.15);
  transform: translateY(-1px);
}

.skip-wrap { display: flex; gap: 4px; align-items: center; }
.skip-select {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 11px;
  background: oklcH(from var(--accent) l c h / 0.07);
  color: var(--accent);
  border: 0.5px solid oklcH(from var(--accent) l c h / 0.25);
  border-radius: 9999px;
  padding: 0 10px;
  height: 38px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  outline: none;
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  box-shadow: 0 2px 8px oklcH(0% 0 0 / 0.04), inset 0 1px 0 oklcH(100% 0 0 / 0.1);
  transition: all .25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
.skip-select:hover {
  background: oklcH(from var(--accent) l c h / 0.14);
  border-color: oklcH(from var(--accent) l c h / 0.4);
  box-shadow: 0 4px 14px oklcH(from var(--accent) l c h / 0.1), inset 0 1px 0 oklcH(100% 0 0 / 0.15);
}

.theme-strip { display: flex; flex-wrap: wrap; gap: 8px; }
.theme-dot {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all .2s;
}
.theme-dot:hover { transform: scale(1.2); }
.theme-dot.active { 
  box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: oklcH(0% 0 0 / 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }
.modal {
  background: oklcH(from var(--surface) l c h / 0.5);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid oklcH(from var(--border) l c h / 0.5);
  border-radius: 20px;
  padding: 32px;
  width: 400px;
  box-shadow: 0 12px 48px oklcH(0% 0 0 / 0.15);
}
.modal h2 { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.setting-group { margin-bottom: 20px; }
.modal-close {
  width: 100%;
  padding: 12px;
  background: oklcH(from var(--accent) l c h / 0.7);
  color: #fff;
  border: 0.5px solid oklcH(from var(--accent) l c h / 0.4);
  border-radius: 9999px;
  font-family: var(--font-display);
  font-weight: 800;
  cursor: pointer;
  transition: all .2s;
}
.modal-close:hover {
  background: oklcH(from var(--accent) l c h / 0.85);
}

.setting-range {
  width: 100%;
  accent-color: var(--accent);
  height: 4px;
  cursor: pointer;
}

@media (max-width: 720px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; }
  .main { padding: 24px; }
}
</style>
</head>
<body>
<div class="sky">
  <div class="cloud cloud-1">
    <span style="width:90px;height:90px;left:0;top:20px"></span>
    <span style="width:130px;height:130px;left:55px;top:-5px"></span>
    <span style="width:100px;height:100px;left:125px;top:25px"></span>
    <span style="width:80px;height:80px;left:180px;top:15px"></span>
    <span style="width:70px;height:70px;left:240px;top:35px"></span>
  </div>
  <div class="cloud cloud-2">
    <span style="width:80px;height:80px;left:0;top:15px"></span>
    <span style="width:110px;height:110px;left:45px;top:-5px"></span>
    <span style="width:90px;height:90px;left:105px;top:20px"></span>
    <span style="width:70px;height:70px;left:155px;top:10px"></span>
  </div>
  <div class="cloud cloud-3">
    <span style="width:110px;height:110px;left:0;top:25px"></span>
    <span style="width:150px;height:150px;left:65px;top:-10px"></span>
    <span style="width:120px;height:120px;left:150px;top:20px"></span>
    <span style="width:100px;height:100px;left:210px;top:30px"></span>
    <span style="width:90px;height:90px;left:270px;top:15px"></span>
    <span style="width:70px;height:70px;left:315px;top:40px"></span>

      <label>Long break <span id="longDisplay">15</span> min</label>
      <input type="range" class="setting-range" id="longRange" min="5" max="30" value="15">

    </div>

<audio id="ambientAudio" loop></audio>

<script>
const PALETTES = [
  { id: 'tech',    label: 'Tech',    color: 'oklcH(58% 0.16 145)' },
  { id: 'sunset',  label: 'Sunset',  color: 'oklcH(62% 0.18 35)' },
  { id: 'ocean',   label: 'Ocean',   color: 'oklcH(55% 0.14 210)' },
  { id: 'forest',  label: 'Forest',  color: 'oklcH(50% 0.16 150)' },
  { id: 'lavender', label: 'Lavender', color: 'oklcH(56% 0.16 290)' },
  { id: 'midnight', label: 'Midnight', color: 'oklcH(60% 0.12 280)' },
  { id: 'cherry',  label: 'Cherry',  color: 'oklcH(62% 0.16 10)' },
  { id: 'desert',  label: 'Desert',  color: 'oklcH(55% 0.16 50)' },
  { id: 'neon',    label: 'Neon',    color: 'oklcH(65% 0.2 160)' },
  { id: 'mono',    label: 'Mono',    color: 'oklcH(45% 0 0)' },
  { id: 'aurora',  label: 'Aurora',  color: 'oklcH(62% 0.18 140)' },
];

const MUSIC_SOURCES = {
  rain: 'https://orangefreesounds.com/wp-content/uploads/2018/01/Soft-rain-sound.mp3',
  forest: 'https://www.orangefreesounds.com/wp-content/uploads/2015/03/Forest-sounds.mp3',
  lofi: 'https://orangefreesounds.com/wp-content/uploads/2026/02/Lo-fi-chill-study-music-relaxing-background-beats.mp3'
};

const STORAGE_KEY = 'pomo_state';
function loadState() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } }
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    workDur: settings.workDur,
    shortDur: settings.shortDur,
    longDur: settings.longDur,
    interval: settings.interval,
    theme: document.documentElement.dataset.theme,
    palette: document.documentElement.dataset.palette,
    tasks, stats
  }));
}

const settings = { workDur: 25, shortDur: 5, longDur: 15, interval: 4 };
let stats = { pomodoros: 0, focusSeconds: 0, sessionCount: 0 };
let tasks = [], timer = null, seconds = 1500, phase = 'work', running = false, currentSession = 1;

const timerDisplay = document.getElementById('timerDisplay'), timerState = document.getElementById('timerState');
const timerStart = document.getElementById('timerStart'), timerReset = document.getElementById('timerReset');
const themeStrip = document.getElementById('themeStrip');
const ambientAudio = document.getElementById('ambientAudio');
const musicSelect = document.getElementById('musicSelect');
const musicPlay = document.getElementById('musicPlay');
const musicVolume = document.getElementById('musicVolume');

function setPalette(id) {
  document.documentElement.dataset.palette = id;
  renderThemeStrip(); saveState();
}

function renderThemeStrip() {
  const current = document.documentElement.dataset.palette || 'tech';
  themeStrip.innerHTML = '';
  PALETTES.forEach(p => {
    const dot = document.createElement('button');
    dot.className = 'theme-dot' + (p.id === current ? ' active' : '');
    dot.style.background = p.color;
    dot.addEventListener('click', () => setPalette(p.id));
    themeStrip.appendChild(dot);
  });
}

function playBeep() {
  try {
    const ctx = new (Window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.type = 'sine'; gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.6);
  } catch {}
}

function tick() {
  seconds--;
  if (seconds <= 0) {
    clearInterval(timer); running = false;
    playBeep();
    if (phase === 'work') { 
      stats.pomodoros++; 
      stats.focusSeconds += settings.workDur * 60;
      stats.sessionCount++; 
      phase = (stats.sessionCount % settings.interval === 0) ? 'long' : 'short'; 
    }
    else phase = 'work';
    seconds = (phase === 'work' ? settings.workDur : (phase === 'long' ? settings.longDur : settings.shortDur)) * 60;
    timerStart.textContent = 'Start';
    updateUI(); saveState(); return;
  }
  updateUI();
}

function updateUI() {
  const m = Math.floor(seconds / 60), s = seconds % 60;
  timerDisplay.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  timerState.textContent = phase.toUpperCase();
  timerState.classList.toggle('break-state', phase !== 'work');
  document.getElementById('pomoCount').textContent = stats.pomodoros;
  
  const hrs = Math.floor(stats.focusSeconds / 3600);
  const mins = Math.floor((stats.focusSeconds % 3600) / 60);
  document.getElementById('focusTime').textContent = hrs > 0 ? ${hrs}h ${mins}m` : `${mins}m`;

  const progress = (stats.sessionCount % settings.interval);
  document.getElementById('sessionLabel').textContent = `${progress} / ${settings.interval} sessions`;
  document.getElementById('sessionProgress').style.width = `${(progress / settings.interval) * 100}%`;

  const totalSessions = stats.sessionCount + 1;
  document.getElementById('timerSession').textContent = `Session ${totalSessions} of ${settings.interval}`;
}

timerStart.addEventListener('click', () => {
  if (running) { clearInterval(timer); running = false; timerStart.textContent = 'Start'; }
  else { timer = setInterval(tick, 1000); running = true; timerStart.textContent = 'Pause'; }
});

timerReset.addEventListener('click', () => {
  clearInterval(timer); running = false; seconds = settings.workDur * 60; phase = 'work'; timerStart.textContent = 'Start'; updateUI();
});

document.getElementById('timerSkip').addEventListener('click', () => {
  clearInterval(timer); running = false;
  const count = document.getElementById('skipOption').value === 'count';
  if (count && phase === 'work') { stats.pomodoros++; stats.sessionCount++; }
  phase = (phase === 'work') ? ((stats.sessionCount % settings.interval === 0) ? 'long' : 'short') : 'work';
  seconds = (phase === 'work' ? settings.workDur : (phase === 'long' ? settings.longDur : settings.shortDur)) * 60;
  timerStart.textContent = 'Start';
  updateUI(); saveState();
});

document.getElementById('taskAdd').addEventListener('click', () => {
  const t = document.getElementById('taskInput').value; if (!t) return;
  tasks.push({ text: t, done: false }); document.getElementById('taskInput').value = ''; renderTasks(); saveState();
});

function renderTasks() {
  const list = document.getElementById('taskList'); list.innerHTML = '';
  if (tasks.length === 0) { list.innerHTML = '<li class="empty-state">No tasks yet</li>'; return; }
  tasks.forEach((t, i) => {
    const li = document.createElement('li'); li.className = 'task-item';
    li.innerHTML = `<span class="task-check ${t.done?'done':'}"></span><span class="task-text ${t.done?'done':'}">${t.text}</span><button class="task-del">✕</button>X;
    li.querySelector('.task-check').onclick = () => { tasks[i].done = !tasks[i].done; renderTasks(); saveState(); };
    li.querySelector('.task-del').onclick = () => { tasks.splice(i, 1); renderTasks(); saveState(); };
    list.appendChild(li);
  });
}

musicPlay.addEventListener('click', () => {
  if (musicSelect.value === 'none') return;
  const targetSrc = MUSIC_SOURCES[musicSelect.value];
  if (!ambientAudio.currentSrc || !ambientAudio.currentSrc.includes(targetSrc)) {
    ambientAudio.src = targetSrc;
  }
  ambientAudio.play().then(() => musicPlay.textContent = 'Pause').catch(() => {});
});

musicSelect.addEventListener('change', () => {
  if (musicSelect.value === 'none') {
    ambientAudio.pause(); ambientAudio.src = ''; musicPlay.textContent = 'Play';
  } else {
    const wasPlaying = !ambientAudio.paused;
    ambientAudio.src = MUSIC_SOURCES[musicSelect.value];
    if (wasPlaying) ambientAudio.play().then(() => musicPlay.textContent = 'Pause').catch(() => {});
    else musicPlay.textContent = 'Play';
  }
});

musicVolume.addEventListener('input', () => ambientAudio.volume = musicVolume.value);

document.getElementById('themeToggle').onclick = () => {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  document.querySelector('.theme-sun').style.display = next === 'dark' ? 'none' : '';
  document.querySelector('.theme-moon').style.display = next === 'dark' ? '' : 'none';
  saveState();
};

document.getElementById('settingsToggle').onclick = () => {
  document.getElementById('settingsModal').classList.add('open');
  document.getElementById('workRange').value = settings.workDur;
  document.getElementById('shortRange').value = settings.shortDur;
  document.getElementById('longRange').value = settings.longDur;
  document.getElementById('intervalRange').value = settings.interval;
  document.getElementById('workDisplay').textContent = settings.workDur;
  document.getElementById('shortDisplay').textContent = settings.shortDur;
  document.getElementById('longDisplay').textContent = settings.longDur;
  document.getElementById('intervalDisplay').textContent = settings.interval;
};
document.getElementById('modalClose').onclick = () => { document.getElementById('settingsModal').classList.remove('open'); saveState(); };

document.getElementById('workRange').addEventListener('input', () => {
  settings.workDur = parseInt(document.getElementById('workRange').value);
  document.getElementById('workDisplay').textContent = settings.workDur;
});
document.getElementById('shortRange').addEventListener('input', () => {
  settings.shortDur = parseInt(document.getElementById('shortRange').value);
  document.getElementById('shortDisplay').textContent = settings.shortDur;
});
document.getElementById('longRange').addEventListener('input', () => {
  settings.longDur = parseInt(document.getElementById('longRange').value);
  document.getElementById('longDisplay').textContent = settings.longDur;
});
document.getElementById('intervalRange').addEventListener('input', () => {
  settings.interval = parseInt(document.getElementById('intervalRange').value);
  document.getElementById('intervalDisplay').textContent = settings.interval;
});

const saved = loadState(); 
if (saved) { 
  Object.assign(stats, saved.stats); 
  if (saved.workDur != null) settings.workDur = saved.workDur;
  if (saved.shortDur != null) settings.shortDur = saved.shortDur;
  if (saved.longDur != null) settings.longDur = saved.longDur;
  if (saved.interval != null) settings.interval = saved.interval;
  tasks = saved.tasks || []; 
  document.documentElement.dataset.palette = saved.palette || 'tech';
  document.documentElement.dataset.theme = saved.theme || 'light';
}

renderThemeStrip(); renderTasks(); updateUI();
</script>
</body>
</html>
